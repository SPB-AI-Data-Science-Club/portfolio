# Nginx config for SPB AI & Data Science Club portfolio
# Deploy to: /etc/nginx/sites-available/spb-club
# Then: ln -s /etc/nginx/sites-available/spb-club /etc/nginx/sites-enabled/
# Then: nginx -t && systemctl reload nginx

server {
    listen 80;
    listen [::]:80;

    # Replace with your domain or VPS IP
    server_name YOUR_DOMAIN_OR_VPS_IP;

    root /var/www/spb-club/portfolio;
    index index.html;

    # Serve static files
    location / {
        try_files $uri $uri/ =404;
    }

    # Cache static assets aggressively
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/javascript image/svg+xml;
    gzip_min_length 1000;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    access_log /var/log/nginx/spb-club.access.log;
    error_log  /var/log/nginx/spb-club.error.log;
}

